name = "devninja-ai-learning"
compatibility_date = "2024-01-15"

[env.production]
name = "devninja-ai-learning"

[env.preview]
name = "devninja-ai-learning-preview"

# Pages configuration
[[pages.env.production.vars]]
NODE_VERSION = "18"
NEXT_TELEMETRY_DISABLED = "1"

[[pages.env.preview.vars]]
NODE_VERSION = "18"
NEXT_TELEMETRY_DISABLED = "1"

# Build configuration for Cloudflare Pages
[build]
command = "npm run build"
publish = "out"

[build.environment]
NODE_VERSION = "18"
NPM_VERSION = "8"